services:
  marzban:
    build: .
    restart: always
    env_file: .env
    ports:
      - "8000:8000"    # Dashboard/API
      - "443:443"      # VLESS TCP Reality (main anti-block protocol)
      - "2053:2053"    # VLESS gRPC Reality
      - "2083:2083"    # VLESS H2 Reality
      - "2087:2087"    # VLESS WebSocket TLS
      - "2096:2096"    # VLESS gRPC TLS
      - "2082:2082"    # VMess WebSocket TLS
      - "2086:2086"    # VMess gRPC TLS
      - "2084:2084"    # Trojan WebSocket TLS
      - "2085:2085"    # Trojan gRPC TLS
      - "1080:1080"    # Shadowsocks TCP/UDP
    volumes:
      - /var/lib/marzban:/var/lib/marzban
      - /var/lib/marzban/certs:/var/lib/marzban/certs
      - ./xray_config.json:/code/xray_config.json
