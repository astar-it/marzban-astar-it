services:
  marzban:
    build: .
    restart: always
    env_file: .env
    # Ports are managed by Coolify UI - do not define here to avoid conflicts
    # For local development, uncomment:
    # ports:
    #   - "8000:8000"
    #   - "4443:4443/udp"  # Hysteria2 (UDP)
    #   - "4443:4443/tcp"  # Hysteria2 fallback
    volumes:
      - /var/lib/marzban:/var/lib/marzban
      - /var/lib/marzban/certs:/var/lib/marzban/certs
