services:
  marzban:
    build: .
    restart: always
    env_file: .env
    # Ports are managed by Coolify UI - do not define here to avoid conflicts
    # For local development, uncomment:
    # ports:
    #   - "8000:8000"
    volumes:
      - /var/lib/marzban:/var/lib/marzban
      - /var/lib/marzban/certs:/var/lib/marzban/certs
      # xray_config.json is baked into the Docker image
      # Keys are auto-generated and persisted in /var/lib/marzban/certs/
